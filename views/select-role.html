<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Role - BabyLink</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
</head>
<body>
  <main>
    <h1>👥 Who are you?</h1>

    <!-- Room Sharing Section -->
    <div class="room-sharing">
      <h3>📤 Share this room:</h3>
      <div class="share-controls">
        <input type="text" id="roomLink" readonly />
        <button id="copyLinkBtn">📋 Copy Link</button>
      </div>
      <div class="qr-container">
        <img id="qrcode" alt="Loading QR code..." />
        <p>Scan QR code to join</p>
      </div>
    </div>

    <!-- Role Selection -->
    <div class="role-selection">
      <div class="role-card">
        <h3>🎤 Baby Device</h3>
        <p>This device will stream audio from the baby</p>
        <form id="babyForm">
          <label for="babyName">Baby's Name:</label>
          <input
            type="text"
            id="babyName"
            name="userName"
            placeholder="e.g. Emma, Room 1, etc."
            maxlength="50"
            required
          />
          <button type="submit" class="role-btn baby-btn">
            🎤 Join as Baby Device
          </button>
        </form>
      </div>

      <div class="role-card">
        <h3>👨‍👩‍👧 Parent Device</h3>
        <p>Monitor multiple babies from this device</p>
        <form id="parentForm">
          <label for="parentName">Your Name (optional):</label>
          <input
            type="text"
            id="parentName"
            name="userName"
            placeholder="e.g. Mom, Dad, etc."
            maxlength="50"
          />
          <button type="submit" class="role-btn parent-btn">
            👨‍👩‍👧 Join as Parent Device
          </button>
        </form>
      </div>
    </div>
  </main>

  <style>
    .room-sharing {
      background: #f8f9fa;
      padding: 1.5em;
      margin: 1em 0;
      border-radius: 0.8em;
      border: 1px solid #e9ecef;
      text-align: center;
    }

    .room-sharing h3 {
      margin-top: 0;
      color: #495057;
    }

    .share-controls {
      display: flex;
      gap: 0.5em;
      margin: 1em 0;
    }

    .share-controls input {
      flex: 1;
      font-family: monospace;
      font-size: 0.9em;
      background: white;
    }

    .share-controls button {
      width: auto;
      white-space: nowrap;
      padding: 0.8em 1em;
      margin: 0;
    }

    .qr-container {
      margin: 1em 0;
    }

    .qr-container img {
      border: 2px solid #dee2e6;
      border-radius: 0.5em;
      background: white;
      padding: 1em;
      max-width: 200px;
      height: auto;
    }

    .qr-container p {
      margin: 0.5em 0 0 0;
      color: #6c757d;
      font-size: 0.9em;
    }

    .role-selection {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5em;
      margin-top: 2em;
    }

    .role-card {
      background: white;
      border-radius: 0.8em;
      padding: 1.5em;
      border: 2px solid #e9ecef;
      transition: all 0.3s;
    }

    .role-card:hover {
      border-color: #3742fa;
      box-shadow: 0 4px 12px rgba(55, 66, 250, 0.15);
    }

    .role-card h3 {
      margin: 0 0 0.5em 0;
      color: #333;
      font-size: 1.5em;
    }

    .role-card p {
      color: #666;
      margin: 0 0 1em 0;
      font-size: 0.95em;
    }

    .role-card form {
      display: flex;
      flex-direction: column;
      gap: 0.8em;
    }

    .role-card label {
      font-weight: bold;
      color: #495057;
      text-align: left;
    }

    .role-card input[type="text"] {
      padding: 0.8em;
      border: 2px solid #dee2e6;
      border-radius: 0.5em;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .role-card input[type="text"]:focus {
      outline: none;
      border-color: #3742fa;
    }

    .role-btn {
      width: 100%;
      padding: 1.2em;
      font-size: 1.1em;
      margin: 0;
      border: none;
      border-radius: 0.8em;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .baby-btn {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
    }

    .baby-btn:hover {
      background: linear-gradient(135deg, #ee5a24, #c23616);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(238, 90, 36, 0.3);
    }

    .parent-btn {
      background: linear-gradient(135deg, #3742fa, #2f3542);
      color: white;
    }

    .parent-btn:hover {
      background: linear-gradient(135deg, #2f3542, #1e272e);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(55, 66, 250, 0.3);
    }

    @media (max-width: 768px) {
      .role-selection {
        grid-template-columns: 1fr;
      }

      .share-controls {
        flex-direction: column;
      }

      .share-controls button {
        width: 100%;
      }
    }
  </style>

  <script>
    // QR Code generation using QR Server API
    function generateQR(text) {
      const qrImg = document.getElementById('qrcode');

      // Use QR Server API (free service) to generate QR code
      const qrText = encodeURIComponent(text);
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${qrText}&bgcolor=ffffff&color=000000&qzone=1&format=png`;
      qrImg.alt = 'QR Code for room link';
      qrImg.title = 'Scan to join BabyLink room';

      // Add error handling
      qrImg.onerror = function() {
        console.log('QR Server API failed, trying alternative method');
        // Use Google Charts API as fallback
        qrImg.src = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${qrText}&choe=UTF-8`;
        qrImg.onerror = function() {
          qrImg.style.display = 'none';
          const fallback = document.createElement('div');
          fallback.style.cssText = 'padding: 1em; background: #f8f9fa; border-radius: 0.5em;';
          fallback.textContent = '📱 QR Code unavailable - please share the link above';
          qrImg.parentNode.appendChild(fallback);
        };
      };
    }

    // Initialize page
    function initializePage() {
      const roomId = window.location.pathname.slice(1);
      const currentUrl = window.location.origin + window.location.pathname;

      // Set room link
      document.getElementById('roomLink').value = currentUrl;

      // Generate QR code
      generateQR(currentUrl);

      // Copy link functionality
      document.getElementById('copyLinkBtn').addEventListener('click', async () => {
        const linkInput = document.getElementById('roomLink');

        try {
          await navigator.clipboard.writeText(linkInput.value);
          const btn = document.getElementById('copyLinkBtn');
          const originalText = btn.textContent;
          btn.textContent = '✅ Copied!';
          btn.style.background = '#28a745';

          setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = '';
          }, 2000);
        } catch (err) {
          // Fallback for older browsers
          linkInput.select();
          document.execCommand('copy');
          alert('Link copied to clipboard!');
        }
      });

      // Baby form submission
      document.getElementById('babyForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const babyName = document.getElementById('babyName').value.trim();
        if (babyName) {
          const url = `${window.location.pathname}?role=baby&userName=${encodeURIComponent(babyName)}`;
          window.location.href = url;
        }
      });

      // Parent form submission
      document.getElementById('parentForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const parentName = document.getElementById('parentName').value.trim() || 'Parent';
        const url = `${window.location.pathname}?role=parent&userName=${encodeURIComponent(parentName)}`;
        window.location.href = url;
      });
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initializePage);
  </script>
</body>
</html>
