<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabyLink Monitor</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6B8EAE">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/monitor.css">
</head>
<body class="monitor-page">
  <h1>BabyLink Monitor</h1>

  <div id="status">Connecting...</div>
  <div id="alert" hidden></div>

  <!-- Wake Lock Status -->
  <div class="wake-lock-container">
    <div class="wake-lock-status">
      <span id="wakeLockIndicator" class="wake-lock-indicator wake-lock-inactive" title="Prevents screen from turning off">Screen Lock: Inactive</span>
      <button id="wakeLockBtn" class="btn btn-success wake-lock-btn">Enable</button>
    </div>
  </div>

  <!-- Main container (populated based on role) -->
  <div id="mainContainer"></div>

  <!-- Hidden audio elements -->
  <audio id="remoteAudio" autoplay playsinline style="display: none;"></audio>
  <audio id="alarmAudio" loop style="display: none;">
    <source src="data:audio/wav;base64,UklGRhYAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQIAAAAAAA==" type="audio/wav">
  </audio>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/multi-stream-manager.js"></script>
  <script src="/js/multi-baby-ui.js"></script>
  <script src="/js/wake-lock-manager.js"></script>
  <script src="/js/alarm-manager.js"></script>
  <script src="/js/esp32-audio-handler.js"></script>
  <script src="/js/sleep-tracker.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
