<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabyLink Monitor</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6B8EAE">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BabyLink">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/monitor.css">
</head>
<body class="monitor-page">
  <header class="app-bar">
    <button type="button" id="homeBtn" class="app-bar__home btn" aria-label="Leave room and go to the home screen" data-i18n-attr="aria-label:mon_home_aria">
      <span class="app-bar__home-icon" aria-hidden="true">←</span>
      <span data-i18n="nav_home">Home</span>
    </button>
    <h1 class="app-bar__title" data-i18n="mon_title">BabyLink Monitor</h1>
    <!-- Language | Theme cluster (theme button injected by utils.js). -->
    <div class="controls-cluster">
      <label class="cc-lang">
        <span class="cc-globe" aria-hidden="true">🌐</span>
        <select id="langSelect" aria-label="Language" data-i18n-attr="aria-label:lang_label"></select>
      </label>
      <span class="cc-divider" aria-hidden="true"></span>
    </div>
  </header>

  <div id="status" data-i18n="mon_connecting">Connecting...</div>
  <div id="alert" hidden></div>

  <!-- Wake Lock Status -->
  <div class="wake-lock-container">
    <div class="wake-lock-status">
      <span id="wakeLockIndicator" class="wake-lock-indicator wake-lock-inactive" title="Prevents screen from turning off" data-i18n="mon_screenlock_inactive" data-i18n-attr="title:mon_screenlock_hint">Screen Lock: Inactive</span>
      <button id="wakeLockBtn" class="btn btn-success wake-lock-btn" data-i18n="mon_enable">Enable</button>
    </div>
  </div>

  <!-- Main container (populated based on role) -->
  <div id="mainContainer"></div>

  <!-- Slim fixed footer bar (shared). Sits below the tiled monitor content;
       the start-monitoring overlay (higher z-index) covers it until dismissed. -->
  <footer class="site-footer">
    <div class="footer-brand">
      <img class="footer-logo" src="/icons/icon-96x96.png" alt="" width="24" height="24" />
      <span class="footer-name">BabyLink</span>
    </div>

    <nav class="footer-actions" aria-label="Get the app and support">
      <a class="footer-app" href="https://github.com/mkampl/babylink-app/releases/latest/download/babylink.apk" rel="noopener" aria-label="Download the Android app" data-i18n-attr="aria-label:footer_app_aria">
        <svg class="footer-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 18c0 .55.45 1 1 1h1v3.5a1.5 1.5 0 0 0 3 0V19h2v3.5a1.5 1.5 0 0 0 3 0V19h1c.55 0 1-.45 1-1V8H6v10zM3.5 8A1.5 1.5 0 0 0 2 9.5v7a1.5 1.5 0 0 0 3 0v-7A1.5 1.5 0 0 0 3.5 8zm17 0a1.5 1.5 0 0 0-1.5 1.5v7a1.5 1.5 0 0 0 3 0v-7A1.5 1.5 0 0 0 20.5 8zM15.53 2.16l1.3-1.3a.5.5 0 0 0-.71-.71l-1.47 1.48A5.98 5.98 0 0 0 12 1c-.96 0-1.87.22-2.68.63L7.88.15a.5.5 0 1 0-.71.71l1.31 1.3A5.98 5.98 0 0 0 6 7h12a5.98 5.98 0 0 0-2.47-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>
      </a>
      <a class="footer-mini footer-mini-icon" href="https://ko-fi.com/mkampl" target="_blank" rel="noopener" aria-label="Support on Ko-fi" data-i18n-attr="aria-label:footer_support_aria">
        <svg class="footer-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 3H4v10a4 4 0 0 0 4 4h6a4 4 0 0 0 4-4v-1h1a3 3 0 0 0 0-6h-1V3zm0 5h1a1 1 0 0 1 0 2h-1V8zM2 21h18v-2H2v2z"/></svg>
      </a>
      <a class="footer-mini footer-mini-icon" href="https://github.com/mkampl/babylink" target="_blank" rel="noopener" aria-label="Source on GitHub" data-i18n-attr="aria-label:footer_source_aria">
        <svg class="footer-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.28-.01-1.03-.02-2.02-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.13 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.82 1.1.82 2.22 0 1.61-.02 2.9-.02 3.29 0 .32.22.7.83.58C20.57 22.29 24 17.8 24 12.5 24 5.87 18.63.5 12 .5z"/></svg>
      </a>
    </nav>
  </footer>

  <!-- Scripts -->
  <script src="/js/i18n.js"></script>
  <script src="/js/sw-register.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/level-meter.js"></script>
  <script src="/js/audio-health.js"></script>
  <script src="/js/multi-stream-manager.js"></script>
  <script src="/js/multi-baby-ui.js"></script>
  <script src="/js/wake-lock-manager.js"></script>
  <script src="/js/alarm-manager.js"></script>
  <script src="/js/esp32-audio-handler.js"></script>
  <script src="/js/sleep-tracker.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
