version: '3.8'

services:
  babylink:
    build: .
    container_name: babylink-app
    ports:
      - "127.0.0.1:3001:3001"  # Only expose on localhost for reverse proxy
    volumes:
      - ./logs:/app/logs  # Mount for logs
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: babylink-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - babylink
    restart: unless-stopped
    profiles:
      - proxy

networks:
  default:
    name: babylink-network
