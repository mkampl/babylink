version: '3.8'

services:
  babylink:
    build: .
    container_name: babylink-app
    ports:
      - "3001:3001"  # Expose on all interfaces for ESP32 access
    volumes:
      - ./logs:/app/logs  # Mount for logs
      - ./data:/app/data  # Mount for room configs (ntfy, PINs)
    environment:
      - NODE_ENV=production
      - PORT=3001
      # LAN address the BLE wizard advertises to ESP32 devices. Inside
      # the container os.networkInterfaces() only sees the docker bridge
      # IP — useless for an ESP that needs to reach the host. Set this
      # in your shell before `docker compose up`, or via .env file.
      # Example: LAN_IP=192.168.178.39 docker compose up -d
      - PUBLIC_HOST=${LAN_IP:-}
      - PUBLIC_PORT=${LAN_PORT:-3001}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: babylink-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - babylink
    restart: unless-stopped
    profiles:
      - proxy

networks:
  default:
    name: babylink-network
