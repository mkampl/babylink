<!DOCTYPE html>
<html>
<head>
  <title>WebRTC Babyphone</title>
</head>
<body>
  <h1>👶 Babyphone</h1>
  <p id="status">Initialisiere...</p>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    let localStream;

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      document.getElementById("status").textContent = "Audio bereit, verbinde...";
      localStream = stream;
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
    });

    pc.onicecandidate = event => {
      if (event.candidate) {
        socket.emit("signal", { type: "ice", candidate: event.candidate });
      }
    };

    pc.ontrack = event => {
      const audio = new Audio();
      audio.srcObject = event.streams[0];
      audio.play();
    };

    socket.on("signal", async data => {
      if (data.type === "offer") {
        await pc.setRemoteDescription(new RTCSessionDescription(data));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("signal", pc.localDescription);
      } else if (data.type === "answer") {
        await pc.setRemoteDescription(new RTCSessionDescription(data));
      } else if (data.type === "ice") {
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    });

    // Wenn du die Seite zuerst öffnest, sende ein Angebot
    async function startCall() {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit("signal", offer);
    }

    startCall();
  </script>
</body>
</html>
