events {
    worker_connections 1024;
}

http {
    upstream babyphone {
        server babyphone:3001;
    }

    # HTTP server (redirects to HTTPS if SSL is available)
    server {
        listen 80;
        server_name _;

        # Check if SSL certificates exist
        location / {
            # If you have SSL certificates, uncomment the next line to redirect to HTTPS
            # return 301 https://$server_name$request_uri;
            
            # For HTTP-only setup, proxy directly to the app
            proxy_pass http://babyphone;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS server (only if SSL certificates are available)
    # Uncomment this section if you have SSL certificates
