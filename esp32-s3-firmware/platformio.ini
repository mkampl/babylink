; BabyLink XIAO ESP32-S3 firmware
;
; Separate codebase from esp32-firmware/. Targets Seeed Studio XIAO
; ESP32-S3 (Sense variant has the OV3660 camera and PDM mic on the
; expansion board; the firmware degrades gracefully if those are
; absent).
;
; Two envs:
;   xiao_esp32s3 — main firmware (src/main.cpp). Default for `pio run`.
;   wifi_scan    — diagnostic that scans + prints visible APs every 5s.
;                  Build: `pio run -e wifi_scan -t upload`.

[platformio]
default_envs = xiao_esp32s3

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

board_build.psram = enabled
board_build.flash_mode = qio
board_build.partitions = default.csv

upload_speed = 921600
monitor_speed = 115200
monitor_filters =
    colorize
    time

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1

lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^6.21.4

[env:xiao_esp32s3]
build_src_filter = +<*> -<wifi_scan.cpp>

[env:wifi_scan]
build_src_filter = -<*> +<wifi_scan.cpp>
